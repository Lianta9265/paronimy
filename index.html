<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Космические паронимы</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
overflow:hidden;
background:#020412;
}

/* видео фон */

#spaceVideo{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

/* затемнение */

.shade{
position:fixed;
inset:0;
background:
radial-gradient(circle at 40% 20%, rgba(0,0,0,.2), rgba(0,0,0,.6)),
linear-gradient(rgba(0,0,0,.2), rgba(0,0,0,.7));
z-index:-1;
}

/* центр */

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

/* стеклянная панель */

.panel{
background:rgba(255,255,255,.08);
backdrop-filter:blur(10px);
padding:40px;
border-radius:20px;
border:1px solid rgba(255,255,255,.15);
box-shadow:0 20px 60px rgba(0,0,0,.6);
}

/* заголовок */

h1{
font-size:36px;
margin-bottom:30px;
}

/* кнопка */

.btn{
font-size:22px;
padding:18px 40px;
border-radius:12px;
border:none;
background:#1aa8e6;
color:white;
cursor:pointer;
transition:.25s;
font-weight:bold;
}

.btn:hover{
transform:scale(1.05);
background:#22c4ff;
box-shadow:0 0 20px rgba(80,200,255,.6);
}

/* canvas звёзд */

#starCanvas{
position:fixed;
inset:0;
pointer-events:none;
z-index:10;
}

</style>
</head>


<body>

<video autoplay muted loop id="spaceVideo">
<source src="space.mp4" type="video/mp4">
</video>

<div class="shade"></div>

<canvas id="starCanvas"></canvas>

<div class="center">

<div class="panel">

<h1>Космические игры с паронимами</h1>

<button class="btn"
onclick="location.href='ediny/'">
ЕДИНЫЙ
</button>

</div>

</div>


<script>

/* звездный курсор */

const canvas = document.getElementById("starCanvas");
const ctx = canvas.getContext("2d");

function resize(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}

resize();
window.addEventListener("resize",resize);

let stars=[];

document.addEventListener("mousemove", e=>{

stars.push({
x:e.clientX,
y:e.clientY,
size:Math.random()*4+2,
alpha:1
});

});


function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

for(let i=0;i<stars.length;i++){

let s=stars[i];

ctx.beginPath();
ctx.fillStyle="rgba(255,255,255,"+s.alpha+")";
ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
ctx.fill();

s.alpha-=0.02;

if(s.alpha<=0){
stars.splice(i,1);
i--;
}

}

requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
